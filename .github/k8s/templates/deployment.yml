apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.service.name }}
  labels:
    app: {{ .Values.service.name }} # deployment will have this label
spec:
  replicas: {{ .Values.service.replicas }} # deployment will create this number of pods
  selector:
    matchLabels:
      app: {{ .Values.service.name }} # deployment manage pods with label app=example
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }} # deployment will label pods with app=example
    spec:
      {{- if .Values.deployment.account }}
      serviceAccountName: {{ .Values.deployment.account }}
      {{- end }}
      containers:
        - name: app
          image: {{ .Values.service.image.name }}:{{ default "latest" .Values.service.image.tag }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: {{ .Values.service.name }}-env
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: {{ .Values.service.name }}-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.service.name }}-env
  labels:
    app: {{ .Values.service.name }}
data:
  FOO: BAR
  {{- range $key, $value := .Values.service.environment }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.service.name }}-html
  labels:
    app: {{ .Values.service.name }}
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8" />
        <title>Hello</title>
      </head>
      <body style="font-family: sans-serif;">
        <h1>Hello from Kubernetes nginx 👋</h1>
        <p>If you can read this, deployment/service/ingress work.</p>
      </body>
    </html>
