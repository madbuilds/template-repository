apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    app: {{ .Values.service.name }} # service will have this label
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.service.name }} # service will forward request to pods with label app=example
  ports:
    - name: http
      port: 80
      targetPort: 80
