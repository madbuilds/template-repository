# File .github/workflows/repository-update.yml
# DESCRIPTION: repos cannot use ORGANIZATION's secrets/vars on the free organization plan
#              as is a workaround, this action sync's repo secrets with a list of repositories
# ${secrets.MADBUILDS_TEMPLATE_SECRETS_SYNC_PAT} - required to have "repo" access for USER_PAT token

on:
  workflow_dispatch:

env:
  REPOSITORIES: |
    telegram-donation-ui
    app-logging
    pritunl
    sbot

  SYNC_APP_ID:        ${{ secrets.MADBUILDS_SYNCAPP_APP_ID }}
  SYNC_CLIENT_ID:     ${{ secrets.MADBUILDS_SYNCAPP_CLIENT_ID }}
  SYNC_CLIENT_SECRET: ${{ secrets.MADBUILDS_SYNCAPP_CLIENT_SECRET }}
  SYNC_PRIVATE_KEY:   ${{ secrets.MADBUILDS_SYNCAPP_PRIVATE_KEY }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.repositories }}
    steps:
      - id: matrix
        run: |
          while read -r repository; do
            [[ -z "$repository" ]] && continue
            if [[ -z "$json" ]]; then
              json="\"$repository\""
            else
              json="$json,\"$repository\""
            fi
          done < <(echo "${{ env.REPOSITORIES }}" | tr -s '[:space:]' '\n')
          echo "repositories=[ ${json} ]" >> $GITHUB_OUTPUT

  update:
    needs:
      - setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - id: auth # https://github.com/tibdex/github-app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ env.SYNC_APP_ID }}
          private_key: ${{ env.SYNC_PRIVATE_KEY }}
      - uses: actions/checkout@v6

      - name: update variables
        uses: ./.github/actions/common/template/update-secrets
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          variables: |
            TEST_VAR="Set from composite action"

      - name: update prod secrets
        uses: ./.github/actions/common/template/update-secrets
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          environment: PRODUCTION
          key: KUBECONFIG
          value: ${{ secrets.KUBECONFIG_PROD }}

      - name: update test secrets
        uses: ./.github/actions/common/template/update-secrets
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          environment: TEST
          key: KUBECONFIG
          value: ${{ secrets.KUBECONFIG_TEST }}

      - name: update other secrets
        uses: ./.github/actions/common/template/update-secrets
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          secrets: |
            MADBUILDS_SYNCAPP_APP_ID=${{ secrets.MADBUILDS_SYNCAPP_APP_ID }}
            MADBUILDS_SYNCAPP_CLIENT_ID=${{ secrets.MADBUILDS_SYNCAPP_CLIENT_ID }}
            MADBUILDS_SYNCAPP_CLIENT_SECRET=${{ secrets.MADBUILDS_SYNCAPP_CLIENT_SECRET }}
          key: MADBUILDS_SYNCAPP_PRIVATE_KEY
          value: ${{ secrets.MADBUILDS_SYNCAPP_PRIVATE_KEY }}

      - name: init repository
        uses: ./.github/actions/common/template/execute-workflow
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          workflow: repository-init.yml

      - name: update branch protection
        uses: ./.github/actions/common/template/protect-branch
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          repositories: ${{ matrix.repository }}
          branch: master
