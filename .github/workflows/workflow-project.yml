# File .github/workflows/workflow-project.yml
# DESCRIPTION: adds created PR/ISSUE to the board for better organizing and monitoring.
#              for ISSUE's applies the issue type based on its title.

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: false
      pr_number:
        description: 'PR number'
        required: false

env:
  SYNC_APP_ID:        ${{ secrets.MADBUILDS_SYNCAPP_APP_ID }}
  SYNC_CLIENT_ID:     ${{ secrets.MADBUILDS_SYNCAPP_CLIENT_ID }}
  SYNC_CLIENT_SECRET: ${{ secrets.MADBUILDS_SYNCAPP_CLIENT_SECRET }}
  SYNC_PRIVATE_KEY:   ${{ secrets.MADBUILDS_SYNCAPP_PRIVATE_KEY }}
  PROJECT_OWNER: ${{ github.repository_owner }}
  PROJECT_ID:    7

permissions:
  contents: read # to check out private repos

jobs:
  board-update:
    name: add to board
    runs-on: ubuntu-latest
    steps:
      - name: Auth # https://github.com/tibdex/github-app-token
        id: auth
        uses: tibdex/github-app-token@v2
        with:
          app_id:      ${{ env.SYNC_APP_ID }}
          private_key: ${{ env.SYNC_PRIVATE_KEY }}

      - uses: actions/checkout@v6
      - uses: ./.github/actions/common/add-to-project
        with:
          GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
          project_owner: ${{ env.PROJECT_OWNER }}
          project_number: ${{ env.PROJECT_ID }}
          issue_number: ${{ inputs.issue_number }}
          pr_number: ${{ inputs.pr_number }}

      - uses: actions/github-script@v8
        if: github.event_name == 'issues'
        with:
          github-token: ${{ steps.auth.outputs.token }}
          script: |
            const title = context.payload.issue.title;
            const issue_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let type;
            if (title.toLowerCase().includes('[request]')) {
              type = '💡Request';
            } else if (title.toLowerCase().includes('[feature]')) {
              type = '🚀Feature';
            } else if (title.toLowerCase().includes('[task]')) {
              type = '🪧Task';
            } else if (title.toLowerCase().includes('[bug]')) {
              type = '🐞Bug';
            }
            
            if (type) {
              await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                owner,
                repo,
                issue_number,
                type, // this is the new REST API field!
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Accept': 'application/vnd.github+json'
                }
              });
              console.log(`✅ Issue type set to "${type}"`);
            } else {
              console.log('⚠️ No matching type found in title.');
            }
